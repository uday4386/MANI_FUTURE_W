version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: samanyudu_db
    restart: always
    environment:
      POSTGRES_USER: samanyudu_user
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: samanyudu_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: samanyudu_app
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://samanyudu_user:your_secure_password@db:5432/samanyudu_db}
      - USE_LOCAL=${USE_LOCAL:-false}
      - PORT=${PORT:-5000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - MESSAGE_CENTRAL_CUSTOMER_ID=${MESSAGE_CENTRAL_CUSTOMER_ID}
      - TWO_FACTOR_API_KEY=${TWO_FACTOR_API_KEY}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_DOMAIN=${R2_PUBLIC_DOMAIN}
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:

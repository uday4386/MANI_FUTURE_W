server {
    listen 80;
    server_name api.samanyudutv.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.samanyudutv.in;
    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/samanyudutv.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samanyudutv.in/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


server {
    listen 80;
    server_name admin.samanyudutv.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.samanyudutv.in;
    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/samanyudutv.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samanyudutv.in/privkey.pem;

    # MUST be above location /
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /var/www/samanyudu-tv/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 80;
    server_name samanyudutv.in www.samanyudutv.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name samanyudutv.in www.samanyudutv.in;

    ssl_certificate /etc/letsencrypt/live/samanyudutv.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samanyudutv.in/privkey.pem;

    root /var/www/samanyudu-tv/public_web_app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
